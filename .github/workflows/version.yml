name: "Version"

on: [pull_request, push]

jobs:
  terraform:
    name: "Version"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: "14"
        run: npm install ; npx cdktf --version; node --version; npm list
